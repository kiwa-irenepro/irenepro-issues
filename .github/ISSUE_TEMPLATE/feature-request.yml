name: Feature request
description: Stel een verbetering of nieuwe functionaliteit voor
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Probleem
      description: Welk probleem lost dit op?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Gewenste oplossing
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra context
  
  - type: input
    id: company
    attributes:
      label: Bedrijfsnaam
      placeholder: Namens welk bedrijf wordt de bug gemeld
  
  - type: input
    id: contact
    attributes:
      label: Contact informatie
      placeholder: Naam of email adres van de contact persoon
